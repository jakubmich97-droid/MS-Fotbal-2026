<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin · MS Tipovačka 2026</title>

  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</head>

<body>
  <header class="hero">
    <div class="hero-content">
      <p class="eyebrow">⚽ Fotbalová tipovačka</p>
      <h1>Admin</h1>
      <p class="subtitle">Vkládání zápasů do Supabase.</p>

      <nav class="top-nav">
        <a href="./index.html" class="nav-link">🏆 Tipovačka</a>
        <a href="./submit.html" class="nav-link">📝 Odeslat tip</a>
        <a href="./admin.html" class="nav-link active">⚙️ Admin</a>
      </nav>
    </div>
  </header>

<main class="admin-page">
  <section class="admin-grid">

    <div class="card admin-card">
      <h2>➕ Přidat zápas</h2>

      <form id="match-form" class="admin-form">
        <label>Datum a čas zápasu</label>
        <input type="date" id="match-date">

        <label>Skupina / fáze</label>
        <input type="text" id="match-group" placeholder="A, B, osmifinále..." required>

        <div class="admin-two-cols">
          <div>
            <label>Domácí tým</label>
            <select id="home-team" required></select>
          </div>

          <div>
            <label>Hostující tým</label>
            <select id="away-team" required></select>    
          </div>
        </div>

        <button type="submit">➕ Přidat zápas</button>
      </form>

      <div id="admin-status"></div>
    </div>

    <div class="card admin-card">
      <h2>✍️ Vložit výsledek</h2>

      <form id="result-form" class="admin-form">
        <label>Zápas</label>
        <select id="result-match-select" required>
          <option value="">Vyber zápas</option>
        </select>

        <div class="admin-two-cols">
          <div>
            <label>Góly domácí</label>
            <input type="number" id="result-home" min="0" required>
          </div>

          <div>
            <label>Góly hosté</label>
            <input type="number" id="result-away" min="0" required>
          </div>
        </div>

        <button type="submit">💾 Uložit výsledek</button>
      </form>

      <div id="result-status"></div>
    </div>

  </section>

  <section class="section">
    <div class="section-header">
      <h2>📋 Zápasy v databázi</h2>
    </div>

    <div class="card">
      <table id="admin-matches-table">
        <thead>
          <tr>
            <th>Datum</th>
            <th>Skupina</th>
            <th>Zápas</th>
            <th>Výsledek</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>
</main>

  <script src="admin.js"></script>
</body>
</html>
